name: ❓ Question
description: Ask a question about the registry
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your question! Please fill out the form below.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: State your question clearly
      placeholder: Describe your question...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to do? What have you tried?
      placeholder: |
        - What are you trying to do?
        - What have you already tried?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which category does your question fall into?
      options:
        - Adding a package
        - Manifest format (asc.yaml / asc.stack.yaml)
        - Registry structure & schemas
        - Connecting a custom registry
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information that might be useful
