# ✅ CI: registry configuration checks — JSON Schema conformance + structural integrity — on every PR and push to main
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: ✅ Validate registry (schemas + structure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Validate registry configuration
        run: npm run validate
